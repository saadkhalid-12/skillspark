<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSpark | Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#0f172a;">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">SkillSpark</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuBar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menuBar">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
<section class="section-space">
  <div class="container">
    <div class="form-area">
      <h2 class="fw-bold mb-3">Student Registration</h2>
      <div class="alert alert-success d-none" id="successMsg">
        Your registration has been submitted successfully.
      </div>
      <form id="registerForm" novalidate>
        <div class="row g-3">
          <div class="col-sm-12 col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" id="fullName" class="form-control" placeholder="Enter full name">
          </div>
          <div class="col-sm-12 col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" id="emailAddress" class="form-control" placeholder="Enter email">
          </div>
          <div class="col-sm-12 col-md-6">
            <label class="form-label">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text">+92</span>
              <input type="text" id="phoneNumber" class="form-control" placeholder="3001234567">
            </div>
          </div>
          <div class="col-sm-12 col-md-6">
            <label class="form-label">Select Course</label>
            <select id="courseSelect" class="form-control">
              <option value="">Choose a course</option>
              <option>HTML & CSS Basics</option>
              <option>Bootstrap Essentials</option>
              <option>Android App Intro</option>
              <option>UI/UX Design Start</option>
              <option>AI Fundamentals</option>
              <option>Data Science Intro</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label d-block">Preferred Shift</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="shift" id="morning">
              <label class="form-check-label" for="morning">Morning</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="shift" id="evening">
              <label class="form-check-label" for="evening">Evening</label>
            </div>
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="agreeCheck">
              <label class="form-check-label" for="agreeCheck">
                I confirm that the information entered is correct
              </label>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Upload Student Card / File</label>
            <input type="file" id="studentFile" class="form-control">
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-success">Submit Registration</button>
          </div>

        </div>
      </form>
    </div>
  </div>
</section>
<button onclick="window.scrollTo(0,0)" class="btn btn-dark back-top">Top</button>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const regForm = document.getElementById("registerForm");
  const successMsg = document.getElementById("successMsg");
  regForm.addEventListener("submit", function(e){
    e.preventDefault();
    let valid = true;
    const name = document.getElementById("fullName");
    const email = document.getElementById("emailAddress");
    const phone = document.getElementById("phoneNumber");
    const course = document.getElementById("courseSelect");
    const file = document.getElementById("studentFile");
    const agree = document.getElementById("agreeCheck");
    const shiftChecked = document.querySelector('input[name="shift"]:checked');
    const fields = [name, email, phone, course, file];
    fields.forEach(function(field){
      if(field.value.trim() === ""){
        field.classList.add("is-invalid");
        field.classList.remove("is-valid");
        valid = false;
      }else{
        field.classList.add("is-valid");
        field.classList.remove("is-invalid");
      }
    });
    if(!shiftChecked){
      valid = false;
      document.getElementById("morning").classList.add("is-invalid");
      document.getElementById("evening").classList.add("is-invalid");
    }else{
      document.getElementById("morning").classList.remove("is-invalid");
      document.getElementById("evening").classList.remove("is-invalid");
    }
    if(!agree.checked){
      agree.classList.add("is-invalid");
      valid = false;
    }else{
      agree.classList.remove("is-invalid");
      agree.classList.add("is-valid");
    }
    if(valid){
      successMsg.classList.remove("d-none");
      regForm.reset();
      document.querySelectorAll(".is-valid").forEach(function(el){
        el.classList.remove("is-valid");
      });
    }
  });
</script>
</body>
</html>
