<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSpark | Contact</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#0f172a;">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">SkillSpark</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuBar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menuBar">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
<section class="section-space">
  <div class="container">
    <div class="row g-4">
      <div class="col-sm-12 col-lg-6">
        <div class="form-area">
          <h2 class="fw-bold mb-3">Contact Us</h2>
          <div class="alert alert-success d-none" id="contactAlert">
            Your message has been sent successfully.
          </div>
          <form id="contactForm">
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" id="visitorName" placeholder="Enter your name">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="visitorEmail" placeholder="Enter your email">
            </div>
            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" id="visitorMessage" rows="5" placeholder="Write your message"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </div>
      <div class="col-sm-12 col-lg-6">
        <div class="rounded-box mb-3">
          <h4 class="fw-bold">Address & Phone</h4>
          <p class="mb-1">SkillSpark Office, Saddar, Rawalpindi</p>
          <p class="mb-1">Phone: 051-1234567</p>
          <p class="mb-0">Email: info@skillspark.com</p>
        </div>
        <div class="rounded-box p-2">
          <iframe
            src="https://maps.google.com/maps?q=Rawalpindi%20Pakistan&t=&z=13&ie=UTF8&iwloc=&output=embed"
            width="100%" height="350" style="border:0;" loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </div>
</section>
<button onclick="window.scrollTo(0,0)" class="btn btn-dark back-top">Top</button>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const contactForm = document.getElementById("contactForm");
  const contactAlert = document.getElementById("contactAlert");
  contactForm.addEventListener("submit", function(e){
    e.preventDefault();
    contactAlert.classList.remove("d-none");
    contactForm.reset();
  });
</script>
</body>
</html>
